syntax = "proto3";
package liveroom;

//务必将package 拼接到 java_package之后,即（com.p1.mobile.longlink.msg. + liveroom）
option java_package = "com.p1.mobile.longlink.msg.liveroom";
option java_outer_classname = "voiceGrabHat";
option optimize_for = LITE_RUNTIME;
import "userMaskConfig.proto";

message VoiceGrabHat {
  string id = 1;
  string liveId = 2;
  string status = 3;
  message CallHatInfo {
    string userId = 1;
    int64 point = 2;
    string hatUrl = 3;
  }
  repeated CallHatInfo callHatInfos = 4;
  int64 updatedTime = 5;
  string toast = 6;

}
message VoiceGrabHatCp {
  string id = 1;
  string userId = 2;
  userMask.UserMask userMask = 3;
  string otherUserId = 4;
  userMask.UserMask otherUserMask = 5;
  int64 lovePoint = 6;
  string hatUrl = 7;
}
