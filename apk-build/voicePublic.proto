syntax = "proto3";
package liveroom;

//务必将package 拼接到 java_package之后,即（com.p1.mobile.longlink.msg. + liveroom）
option java_package = "com.p1.mobile.longlink.msg.liveroom";
option java_outer_classname = "LongLinkVoicePublicLive";
option optimize_for = LITE_RUNTIME;

message VoicePublicLive {
  string liveId = 1;
}
