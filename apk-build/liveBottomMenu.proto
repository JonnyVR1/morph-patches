syntax = "proto3";

package liveroom;

//务必将package 拼接到 java_package之后,即（com.p1.mobile.longlink.msg. + liveroom）
option java_package = "com.p1.mobile.longlink.msg.liveroom";
option java_outer_classname = "LongLinkBottomMenu";
option optimize_for = LITE_RUNTIME;

message LiveBottomMenuUpdate {
}



message LivePictureTextAlert {
  enum ActionType {
    normal = 0;
    anchorKickOut = 1;
    }
  string pictureUrl = 1;
  string text = 2;
  string buttonText = 3;
  ActionType action = 4;
}