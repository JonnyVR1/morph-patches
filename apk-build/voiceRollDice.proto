syntax = "proto3";
package voicelivemessage;

//务必将package 拼接到 java_package之后,即（com.p1.mobile.longlink.msg. + userMask）
option java_package = "com.p1.mobile.longlink.msg.voicelivemessage";
option java_outer_classname = "VoiceRollDice";
option optimize_for = LITE_RUNTIME;

message VoiceGiftWallLightNoticeMessage {
  string roomId = 1;
  string liveId = 2;
  string profileUserId = 3; // 资料页用户ID
  GiftWallLightAction action = 4;
}

enum GiftWallLightAction {
  refreshTab = 0; // 刷新tab页
}
