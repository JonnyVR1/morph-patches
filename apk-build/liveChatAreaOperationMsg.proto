syntax = "proto3";
package intllivecommon;

//务必将package 拼接到 java_package之后,即（com.p1.mobile.longlink.msg. + userMask）
option java_package = "com.p1.mobile.longlink.msg.liveroom";
option java_outer_classname = "LiveChatAreaOperationMessage";
option optimize_for = LITE_RUNTIME;


message JumpLink{
string url = 1;
int64 showTime = 2;
float widthHighRatio =3;
float widthScreenRatio =4;
bool enableClose = 5;
string schema =6;
bool isClientDeal =7;
}

message ChatAreaOperationSiteContainer{
JumpLink jumpLinkItem = 1;
}