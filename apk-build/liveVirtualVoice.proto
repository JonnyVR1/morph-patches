syntax = "proto3";
package liveroom;

//务必将package 拼接到 java_package之后,即（com.p1.mobile.longlink.msg. + liveroom）
option java_package = "com.p1.mobile.longlink.msg.liveroom";
option java_outer_classname = "LongLinkVirtualVoice";
option optimize_for = LITE_RUNTIME;

import "template.proto";
import "userMaskConfig.proto";


// msgTypeName = "voice.trick:admin.panel.counter"
message VoiceAdminPanelCounterMessage {
  enum MsgType {
    refresh = 0;
  }
  MsgType   msgType = 1;
  string    roomId = 2;
}

// 解散房间
message VoiceRoomDissolve {
  string userId = 1;
  string roomId = 2;
}

// 入驻长链
// msgTypeName = "voice.trick.settle"
message VoiceSettleMessage {
  enum MsgType {
    apply = 0;  // 申请
    approve = 1;  // 同意
    reject = 2;  // 拒绝
    quit = 3;     // 取消入驻
    updateSettledCount = 4; // 更新入驻人数
  }
  MsgType   msgType = 1;
  string    id = 2;
  string    userId = 3;
  string    roomId = 4;
}

message BgStyle {
  string startColor = 1; // 开始颜色
  string endColor = 2; // 结束颜色
  string alpha = 3; // 透明度
}

// 用户侧通知
// msgTypeName = "live.voice.guide"
message VoiceUserGuide {
  string icon = 1; // 图标
  BgStyle bgStyle = 2; // 背景样式
  string content = 3; // 内容
  string schema = 4; // 跳转，有shema时展示箭头
  int64 showSeconds = 5; // 停留时长
  string guideType = 6; // 引导类型，用于打点，
}

message VoiceRoomLevelUp {
  string roomId = 1;
  int32 level = 2;
  string levelIcon = 3;
  int64 updatedTime = 4; // 毫秒
  string startColor = 5;
  string endColor = 6;
  string levelSmallIcon = 7;
}

message VoiceRoomHeatUpdate {
  string roomId = 1;
  int64 heat = 2;
  int64 updatedTime = 3;
  string heatIcon = 4;
  string heatSvga = 5;
}

message StarRedpacketInfo {
  string id = 1;
  string roomId = 2;
  string state = 3;
}

// msgTypeName = "voice.live.template"
message VoiceLiveTemplateMessage {
  string   userId = 1;
  string   roomId = 2;
  string   liveId = 3;
  string   template = 4;
}
message VoiceRoomPersonalUpdate {
  string roomId = 1;
  bool isPersonal = 2; // 更新后是否私人房
}

// msgTypeName = "voice.trick.chatTopic"
message VoiceChatTopicMessage {
  string   topic = 1;
  string   tag = 2;
}

// msgType =  live.voiceRoom.updateTitle
message VoiceRoomTitleUpdate {
  string roomId = 1; // 房间id
  template.TemplateData tempdata = 2; // 聊聊消息
  string title = 3;
}
// msgTypeName = "voice.trick.shareScreen"

message VoiceShareScreen {
  string   id = 1;
  string   userId = 2;
  string   roomId = 3;
  enum Status {
    start = 0; // 发起投屏
    sharing = 1; // 开始投屏
    stopped = 2; // 结束投屏
  }
  Status status = 4;
  userMask.UserMask userMask = 5;
  template.TemplateData templateData = 6;   // 要展示的聊聊
  string toast = 7;
  float ratio = 8; // 屏幕比例
  string desc = 9; // 新增共享屏幕内容描述
}

// msgTypeName = "voice.live.streamBizType"
message VoiceStreamBizTypeMessage {
  string   roomId = 1;
  string   liveId = 2;
  int32    bizType = 3;
}
// msgTypeName = "voice.trick.settle.invite"
message VoiceSettleInviteMessage {
  string    fromUserId = 1;
  string    fromUserName = 2;
  string    userId = 3;
  string    roomId = 4;
  string applyToken = 5; // 申请入驻时需要携带这个token
}
// msgTypeName = "voice.trick.tone"
message VoiceToneMessage {

}

// msgTypeName = "voice.trick.shareScreenDesc"
message VoiceShareScreenDesc {
  string   id = 1;
  string   userId = 2;
  string   roomId = 3;
  string   desc = 4; // 新增投屏描述
}

message LuckyParadiseEntrance {
  bool   isCrazyNow = 1;
  string   poolType = 2;
  int64   currentTime = 3;
  int64   endTime = 4;
  string   defaultIcon = 5;
  string   crazyIcon = 6;
}
message VoiceLiveSVGAAnimation {
  string roomId = 1;
  string svgaUrl = 2;
  repeated VoiceLiveSGVAAnimationExtra animationExtras = 3; // 特效礼物所需的资源
}

message VoiceLiveSGVAAnimationExtra {
  string key = 1;
  int64 type = 2;  // pic text 两种类型
  string value = 3;
  string textColor = 4;
  int64 textSize = 5;
  int64 textFont = 6;
}

// msgTypeName = 'voicelive.lovePlanet.update'
message VoiceLiveLovePlanetUpdate {
  enum Type {
    refreshLovePlanet = 0; // 刷新lovePlanet信息，客户端拉取lovePlanet详情接口更新整体数据
    updateMvp = 1; //更新mvp用户
    insertHost = 2; //更新主持用户，可能更新为空
    deleteHost = 3; //更新主持用户，可能更新为空
    updatePlayers = 4; //旅行阶段前更新嘉宾选择和心动值
    insertPlayers = 5; //旅行阶段前新增嘉宾
    deletePlayers = 6; //旅行阶段前嘉宾下线
    updateTeamAndPlayer = 7;//旅行阶段更新
  }
  Type updateType = 1;
  int64 currentTime = 2;
  string lovePlanetId = 3;
  VoiceLovePlanetUser mvp = 4;//updateType=1
  VoiceLovePlanetUser host = 5; //updateType=2
  repeated VoiceLovePlanetUser players = 6; //updateType= 4，5，6，7
  repeated VoiceLovePlanetTeam teams = 7;
}

message VoiceLovePlanetUser {
  string userId = 1;
  string userName = 2;//只有insertPlayers有
  string avatar = 3;//只有insertPlayers有
  int64 receivedScore = 4; //收到的心动
  int64  position = 5; //麦位 只有insertPlayers有
  int64 selectPosition = 6;//选择麦位 只有insertPlayers有
  string gender = 7;
  bool isLeave = 8;
  int64 sendScore = 9;//mvp送出的心动
  userMask.AvatarConfig avatarConfig = 10;//userMask
}

message VoiceLovePlanetTeam {
  string userId = 1;
  string otherUserId = 2;
  int64 totalScore = 3;
  string tips = 4; //提示信息
}

//msgType：voicetrick.payGuide.popUp
message VoicePayGuidePopUp {
  string userId = 1; // 接收长链的用户id
  string roomId = 2; // 接收长链的用户id所在房间
  string title = 3;
  string subTitle = 4;
  string bubbleTitle = 5; // type1 气泡形式展示的标题
  string buttonTitle = 6;
  int64 giftId = 7;
  string giftIcon = 8;
  GuideType guideType = 9;
  userMask.UserMask toUserMask = 10; // 收礼用户（ID，头像）
  string userTag = 11; // type3 头像下方展示
  int64 giftCount = 12;

}
message VoicePayGuideUserTag {
  string text =1;
  string color = 2;
  string type =3;// like、same_city、high_pop、match
}
enum GuideType {
    empty = 0;//无效
    fromUser = 1;//踩人进房
    other = 2;//非踩人进房
  }
message VoicePayGuideV2PopUp {
  string userId = 1; // 接收长链的用户id
  string roomId = 2; // 接收长链的用户id所在房间
  string title = 3;
  string subTitle = 4;
  string bubbleTitle = 5; // type1 气泡形式展示的标题
  string buttonTitle = 6;
  int64 giftId = 7;
  string giftIcon = 8;
  int64 giftCount = 9;
  GuideType guideType = 10;
  VoicePayGuideUserInfo toUserInfo= 11; // 收礼用户（ID，头像，年龄，性别，星座）
  VoicePayGuideUserTag userTag = 12; //用户标签
  string  relationshipType  =13; // relationship match/like/stranger
  string  bizType  = 14;
}
message VoicePayGuideUserInfo {
  string userId = 1;
  string name = 2;
  string avatar = 3;
  string gender = 4;
  int32  age = 5;
  string zodiac = 6;
}

//      voicetrick.voicePayGuideUser.pull
message VoicePayGuideUser {
  string userId = 1;  // 接收长链的用户id
}
//送礼付费引导二期
//msgTypeName: voicetrick.avatarFramePayGuide.popUp
message VoiceAvatarFramePayGuidePopUp {
  string   userId = 1;   // 接收长链的用户id
  string   title = 2;   // 标题
  string   subTitle = 3;   // 子标题
  userMask.UserMask fromUserMask = 4;   // 送礼用户
  userMask.UserMask toUserMask = 5;   // 收礼用户
  string   buttonTitle = 6;   // 按钮标题
  string   buttonSubTitle = 7;   // 按钮副标题
  int64    giftId = 8;   // 礼物id
  int64    giftCount = 9;   // 礼物数量
}
// 游乐园底部按钮
// msgTypeName = "voice.campaign.funFair.bottomEntrance"
message VoiceFunFairEntrance {
  int64 currentTime = 1;  // 当前时间戳
  string defaultIcon = 2; // 默认icon
  string tip = 3;         // 右上角文案
  bool buff = 4;          // 是否开启buff
  string  poolType = 5;   // primary-初级场, senior-高级场
  string  buffIcon = 6;   // buff icon
  string buffText = 7;    // buff 底部文案
  int64 endTime = 8;      // buff状态结束时间戳(ms)
}
message VoiceRoomCover {
  string roomId = 1; // 房间id
  string coverUrl = 2; // 房间封面
}

// msgTypeName = "voice.trick.game"
message VoiceGameMessage {
  enum MsgType {
    unknown = 0;
    start = 1;
    end = 2;
  }
  MsgType   msgType = 1;
  string    gameId = 2;
  string gameType = 3;
}
// msgTypeName = "voice.live.gameType"
message VoiceLiveGameTypeMessage {
  string   liveId = 1;
  string   gameType = 2;
}