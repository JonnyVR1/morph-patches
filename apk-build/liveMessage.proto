message PkExecuteConfig {
  bool  enable = 1;
  int64 prepareStageDuration = 2; // 准备时长
  int64 noticeStageDuration = 3; // 预告时长
  int64 continuousExecutedDuration = 4; // 斩杀需要持续的时长
  int64 executeLine = 5; // 斩杀线
}

message PkExecuteInfo {
  bool executed = 1; // 是否开启斩杀
  string executeUserId = 2; // 斩杀方
  string executedUserId = 3; // 被斩杀方
  int64 executedStartTs = 4; // 斩杀开始时间
  int64 executedEndTs = 5; // 斩杀结束时间
}


enum PkEndType {
  system = 0; // 正常结束
  executed = 15;  // 斩杀结束
}

