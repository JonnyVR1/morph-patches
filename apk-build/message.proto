syntax = "proto3";
package connector;
//务必将package 拼接到 java_package之后,即（com.p1.mobile.longlink.msg. + connector）
option java_package = "com.p1.mobile.longlink.msg.connector";
option java_outer_classname = "LongLinkMessage";
option optimize_for = LITE_RUNTIME;

import "google/protobuf/any.proto";

enum MsgTypeEnum {
  MSG_TYPE_CHAT_MSG = 0;
  MSG_TYPE_PUSH_ACK = 1;
  MSG_TYPE_AUTH = 2;
  MSG_TYPE_AUTH_ACK = 3;
  MSG_TYPE_NEW_CONVERSATION = 4;
  MSG_TYPE_DELETE_CONVERSATION = 5;
  MSG_TYPE_CANCEL_MSG = 6;
  MSG_TYPE_MOMENT_LIKE = 7;
  MSG_TYPE_MOMENT_CANCEL_LIKE = 8;
  MSG_TYPE_SWITCH_SIDE = 9;
  MSG_TYPE_MOMENT_COMMENT = 10;
  MSG_TYPE_LIVECHAT_POPUP = 11;
  MSG_TYPE_RED_PACKETS_BROADCAST = 12;
  MSG_TYPE_RED_PACKETS_RECEIVED = 13;
  MSG_TYPE_LIVE_CHAT_RECALL = 14;
  MSG_TYPE_CHAT_TYPING = 16;
  //LIVE CONTROL MSG
  MSG_TYPE_LIVE_SYSTEM_MSG = 100; //系统消息
  MSG_TYPE_LIVE_CHAT_MSG = 101; //普通聊天消息
  MSG_TYPE_LIVE_START = 102; //开播消息
  MSG_TYPE_LIVE_STOP = 103; //关播消息
  MSG_TYPE_LIVE_PAUSE = 104; //暂停直播
  MSG_TYPE_LIVE_RECOVER = 105; //恢复直播
  MSG_TYPE_LIVE_ENTER_ROOM = 106; //进入直播间消息
  MSG_TYPE_LIVE_LEAVE_ROOM = 107; //离开直播间消息
  MSG_TYPE_LIVE_JAIL = 108; //禁言消息
  MSG_TYPE_LIVE_BOOT = 109; //被剔除房间消息
  MSG_TYPE_LIVE_BLOCK_MSG = 110; //拉黑消息
  MSG_TYPE_LIVE_LIVEINFO = 111; //直播动态
  MSG_TYPE_LIVE_FORCE_STOP = 112; // 强制断播
  MSG_TYPE_LIVE_FORBIDDEN_MULTIDEVICE = 113; //禁止多设备登录：下线前一个设备

  MSG_TYPE_LIVE_FOLLOW = 140; //关注主播广播

  //live-chat msg type
  MSG_TYPE_LIVE_CLIENT_CHATREQ = 150; //客户端上行消息
  MSG_TYPE_LIVE_CHAT_GIFT_MSG = 151; //聊天礼物消息
  //live-gift msg type
  MSG_TYPE_LIVE_GIFT_RECEIVED = 160;
  MSG_TYPE_LIVE_GIFT_LEADERBOARD = 161;


  MSG_TYPE_LIVE_CLIENT_CHATACK = 200; // 直播间聊天消息ACK
  //live-chat ack msg type
  MSG_TYPE_LIVE_SERVER_ACK = 201; //长连接服务ACK
  MSG_TYPE_CHAT_BLOCK = 17;
  MSG_TYPE_COMMON = 1000;
}

/* Down Stream */
// Downstream message
message Msg {
  MsgTypeEnum type = 1;
  string msgId = 2;
  google.protobuf.Any data = 3;
  PushContent push = 4;
  string msgTypeName = 5;
  string version = 7;
  bool isAck = 8;
  bool isReliable = 9;
}

message Msgs {
  repeated Msg msgs = 1;
}


message PushContent {
  IdType content = 1;
  I18n title = 2;
  I18n value = 3;
  I18n ticker = 4;
  string primaryPicture = 5;
  int32 priority = 6;
  int32 stackId = 7;
  bool silentAggregation = 8;
  bool silent = 9;
  string message = 10;
  string intent = 11;
  int64 createTime = 12;
  string imageURLWithoutFormat = 13;
  string reqId = 14;
  string link = 15;
  int32 counter = 16;
  map<string, string> messageCustom = 17;

}

message IdType {
  string id = 1;
  string type = 2;
  IdType parent = 3;
}

message I18n {
  string value = 1;
  map<string, string> locales = 2;
  repeated string params = 3;
}


