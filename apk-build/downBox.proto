syntax = "proto3";

package liveroom;

//务必将package 拼接到 java_package之后,即（com.p1.mobile.longlink.msg. + liveroom）
option java_package = "com.p1.mobile.longlink.msg.liveroom";
option java_outer_classname = "LongLinkLiveDownBox";
option optimize_for = LITE_RUNTIME;

enum DynamicType {
  fall = 0;
}


enum AccessChannelJumpType {
  url = 0;  // url
  schema = 1; // schema
}


message LiveAccessChannel{
  string outerIcon = 1; // 外部图标
  string innerIcon = 2; // 内部图标
  DynamicType dynamicType = 3; // 动效类型
  AccessChannelJumpType jumpType = 4; // 请求/跳转类型
  string  jumpSchema = 5; // 请求/跳转地址
  string  outerVanishDynamic = 6; // 外部图标消失动效
  string  source = 7; // 来源
  int64    bottomRemainDuration = 8; //底部停留时长，秒
}