syntax = "proto3";
package intllivecommon;

//务必将package 拼接到 java_package之后,即（com.p1.mobile.longlink.msg. + userMask）
option java_package = "com.p1.mobile.longlink.msg.voicelivemessage";
option java_outer_classname = "VoiceNineMicUserScore";
option optimize_for = LITE_RUNTIME;

message VoiceLiveBossUserScore {
  string   roomId = 1;
  string  liveId = 2;
  message BossUserScore {
    string userId = 1;
    int64 popularity = 2;
    int64 contribution = 3;
  }
  repeated BossUserScore bossUserScore = 3;
}

